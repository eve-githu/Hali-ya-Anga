<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Weather App</title>
    <link rel="stylesheet" href="src/index.css" />
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input
            type="text"
            placeholder="Enter a city..."
            class="city-input"
            id="search-form-input"
          />
          <input type="submit" value="Search" class="city-input-value" />
        </form>
      </header>
      <div class="weather-data">
        <div>
          <h1 id="city">Nairobi</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: <strong>66%</strong>, Wind: <strong>3.13km/h</strong>
          </p>
        </div>
        <div class="temperature-details">
          <div class="temperature-icon">🌤️</div>
          <div class="temperature-value">12</div>
          <div class="temperature-unit">°C</div>
        </div>
      </div>
      <footer>
        This project was coded by
        <a href="https://github.com/eve-githu" target="_blank">Eve Githu 🇰🇪</a>
        and is open sourced on
        <a
          href="https://github.com/eve-githu?tab=repositories&q=&type=&language=&sort="
          >GitHub</a
        >
        and hosted on Netlify
      </footer>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
